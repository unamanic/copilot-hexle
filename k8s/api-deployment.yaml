apiVersion: apps/v1
kind: Deployment
metadata:
  name: hexle-api
  namespace: hexle
  labels:
    app: hexle-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hexle-api
  template:
    metadata:
      labels:
        app: hexle-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: hexle-api
          image: unamanic/hexle-api:e97904b
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: REDIS_HOST
              value: "hexle-redis.hexle.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hexle-api
  namespace: hexle
  labels:
    app: hexle-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hexle-api
  template:
    metadata:
      labels:
        app: hexle-api
    spec:
      containers:
        - name: hexle-api
          image: unamanic/hexle-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

services:

  redis:
    image: redis:8.6-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped

  ui:
    build:
      context: ui
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis-data:
